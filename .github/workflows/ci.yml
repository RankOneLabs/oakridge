name: CI

on:
  pull_request:
    branches:
      - main
      - "epic/**"

jobs:
  kbbl-typecheck:
    name: kbbl typecheck (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # --frozen-lockfile fails fast if bun.lock has drifted from
      # package.json — keeps CI builds reproducible against the
      # committed lock.
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  kbbl-tests:
    name: kbbl backend tests (bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter kbbl test

  kbbl-pwa-tests:
    name: kbbl PWA tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter kbbl test:pwa

  lbc-dashboard-tests:
    name: lbc-dashboard tests (bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run --filter lbc-dashboard test

  legit-biz-club:
    name: legit-biz-club checks (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legit-biz-club
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      # --frozen fails fast if uv.lock has drifted from pyproject.toml,
      # matching the bun side's reproducibility guarantee.
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run mypy src
      - run: uv run pytest

  oakridge-core:
    name: oakridge-core build & test (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oakridge-core
    env:
      # Build against the committed .sqlx offline metadata so CI needs no live
      # database for sqlx's compile-time query checking.
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: oakridge-core
      # --locked fails fast if Cargo.lock has drifted from Cargo.toml,
      # matching the bun/uv reproducibility guarantee.
      - run: cargo build --locked --all-targets
      # The lifecycle e2e drives a mock-cc bash script (needs only bash + curl,
      # both present on ubuntu-latest); the real-CC smoke test is #[ignore]d, so
      # the default run needs no claude binary or auth.
      - run: cargo test --locked
