name: CI

on:
  pull_request:
    branches: [main]

jobs:
  kbbl-typecheck:
    name: kbbl typecheck (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck

  legit-biz-club:
    name: legit-biz-club checks (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legit-biz-club
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check
      - run: uv run mypy src
      - run: uv run pytest
